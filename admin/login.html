<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – StepUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--sage-light) 0%, var(--mint) 100%);
      padding: 2rem;
    }
    
    .login-box {
      background: var(--white);
      padding: 3rem;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(74, 124, 89, 0.15);
      max-width: 420px;
      width: 100%;
    }
    
    .login-box h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    
    .login-box p {
      color: var(--text-mid);
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.875rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--sage);
    }
    
    .btn-login {
      width: 100%;
      background: var(--sage);
      color: white;
      padding: 0.875rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.3s;
      font-family: 'DM Sans', sans-serif;
    }
    
    .btn-login:hover {
      background: var(--sage-dark);
    }
    
    .btn-login:disabled {
      background: var(--text-light);
      cursor: not-allowed;
    }
    
    .error-message {
      background: #fee;
      color: #c33;
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .success-message {
      background: #efe;
      color: #3a3;
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    
    .back-link a {
      color: var(--sage);
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>Admin Login</h1>
      <p>Secure access to StepUp admin panel</p>
      
      <div id="error-message" class="error-message"></div>
      <div id="success-message" class="success-message"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="admin1@gmail.com" required />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>
        
        <button type="submit" class="btn-login" id="login-btn">Sign In</button>
      </form>
      
      <div class="back-link">
        <a href="../index.html">← Back to Store</a>
      </div>
    </div>
  </div>
  
  <script type="module">
    // Supabase Configuration
    const SUPABASE_URL = 'https://bgmutbfurqlgyszbkyxs.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnbXV0YmZ1cnFsZ3lzemJreXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjQ2NzksImV4cCI6MjA5NzcwMDY3OX0.iBkb1zSMcsfBrT0lqr53uDcjBSJX3yO87wSgPmb9ArE';

    // Initialize Supabase client
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    console.log('Supabase initialized successfully');

    // Show/hide messages
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function showSuccess(message) {
      const successDiv = document.getElementById('success-message');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
    }

    // Check if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      console.log('Already logged in, redirecting...');
      window.location.href = 'admin.html';
    }

    // Email/Password Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('login-btn');
      
      console.log('Login attempt for:', email);
      
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });
        
        if (error) throw error;
        
        console.log('Login successful!');
        showSuccess('Login successful! Redirecting...');
        
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1000);
        
      } catch (error) {
        console.error('Login error:', error);
        showError(error.message || 'Login failed. Please check your credentials.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
