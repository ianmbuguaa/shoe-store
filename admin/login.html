<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – StepUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--sage-light) 0%, var(--mint) 100%);
      padding: 2rem;
    }
    
    .login-box {
      background: var(--white);
      padding: 3rem;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(74, 124, 89, 0.15);
      max-width: 420px;
      width: 100%;
    }
    
    .login-box h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    
    .login-box p {
      color: var(--text-mid);
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.875rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--sage);
    }
    
    .btn-login {
      width: 100%;
      background: var(--sage);
      color: white;
      padding: 0.875rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.3s;
      font-family: 'DM Sans', sans-serif;
    }
    
    .btn-login:hover {
      background: var(--sage-dark);
    }
    
    .btn-login:disabled {
      background: var(--text-light);
      cursor: not-allowed;
    }
    
    .error-message {
      background: #fee;
      color: #c33;
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .success-message {
      background: #efe;
      color: #3a3;
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .divider {
      text-align: center;
      margin: 1.5rem 0;
      position: relative;
    }
    
    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border);
    }
    
    .divider span {
      background: white;
      padding: 0 1rem;
      color: var(--text-mid);
      font-size: 0.85rem;
      position: relative;
    }
    
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    
    .back-link a {
      color: var(--sage);
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>Admin Login</h1>
      <p>Secure access to StepUp admin panel</p>
      
      <div id="error-message" class="error-message"></div>
      <div id="success-message" class="success-message"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="admin@stepup.com" required />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>
        
        <button type="submit" class="btn-login" id="login-btn">Sign In</button>
      </form>
      
      <div class="divider">
        <span>OR</span>
      </div>
      
      <button type="button" class="btn-login" id="magic-link-btn" style="background: var(--text-dark);">
        Send Magic Link
      </button>
      
      <div class="back-link">
        <a href="../index.html">← Back to Store</a>
      </div>
    </div>
  </div>
  
  <script type="module" src="../js/admin-auth.js"></script>
</body>
</html>
